name: gms

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gms}
      POSTGRES_DB: ${POSTGRES_DB:-gms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gms} -d ${POSTGRES_DB:-gms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-secret}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-System Owner}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@gms.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-gms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gms}
      POSTGRES_DB: ${POSTGRES_DB:-gms}
      POSTGRES_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data:
  minio_data:
